<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>考研学习工具 v1.0</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
:root {
  --bg: #f0f2f5;
  --surface: #ffffff;
  --border: #e5e7eb;
  --text: #1f2937;
  --text-secondary: #6b7280;
  --primary: #4f46e5;
  --primary-light: #eef2ff;
  --success: #10b981;
  --danger: #ef4444;
  --warning: #f59e0b;
  --math: #3b82f6;
  --english: #10b981;
  --politics: #ef4444;
  --cs: #8b5cf6;
  --bagu: #f59e0b;
  --radius: 12px;
  --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
  --shadow-lg: 0 10px 25px rgba(0,0,0,.1);
  --transition: 0.2s ease;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── Header ── */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 60px;
  flex-shrink: 0;
  box-shadow: var(--shadow);
  z-index: 10;
}
.header h1 {
  font-size: 1.25rem;
  font-weight: 700;
  background: linear-gradient(135deg, var(--primary), #7c3aed);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* ── Section Tabs ── */
.section-tabs {
  display: flex;
  gap: 4px;
  background: var(--bg);
  border-radius: 10px;
  padding: 3px;
}
.section-tab {
  padding: 8px 18px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  font-size: 0.875rem;
  font-weight: 500;
  color: var(--text-secondary);
  background: transparent;
  transition: var(--transition);
  white-space: nowrap;
}
.section-tab:hover { color: var(--text); background: rgba(255,255,255,.6); }
.section-tab.active { color: #fff; font-weight: 600; }
.section-tab.math.active { background: var(--math); }
.section-tab.english.active { background: var(--english); }
.section-tab.politics.active { background: var(--politics); }
.section-tab.cs.active { background: var(--cs); }
.section-tab.bagu.active { background: var(--bagu); }

/* ── Toolbar ── */
.toolbar {
  display: flex;
  align-items: center;
  gap: 12px;
}
.btn {
  padding: 8px 18px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  font-size: 0.875rem;
  font-weight: 500;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: var(--transition);
}
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: #4338ca; }
.btn-outline { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
.btn-outline:hover { background: var(--bg); }
.btn-sm { padding: 5px 12px; font-size: 0.8rem; }
.btn-success { background: var(--success); color: #fff; }
.btn-success:hover { background: #059669; }

/* ── Main Layout ── */
.main {
  display: flex;
  flex: 1;
  overflow: hidden;
}
.mindmap-panel {
  flex: 1;
  min-width: 0;
  background: var(--surface);
  margin: 16px 0 16px 16px;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  position: relative;
  overflow: hidden;
}
.detail-panel {
  width: 420px;
  flex-shrink: 0;
  margin: 16px;
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}
.detail-empty {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: var(--text-secondary);
  padding: 40px;
  text-align: center;
  gap: 12px;
}
.detail-empty .icon { font-size: 3rem; opacity: .5; }
.detail-content { padding: 24px; display: none; }
.detail-content.active { display: block; }

.detail-title {
  font-size: 1.1rem;
  font-weight: 700;
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 2px solid var(--primary-light);
  color: var(--primary);
}
.detail-section { margin-bottom: 20px; }
.detail-section h3 {
  font-size: 0.9rem;
  font-weight: 600;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.exam-point { padding: 8px 12px; background: #fffbeb; border-left: 3px solid var(--warning); margin-bottom: 6px; border-radius: 0 6px 6px 0; font-size: .875rem; }
.example-item { padding: 12px; background: #f8fafc; border-radius: 8px; margin-bottom: 10px; font-size: .85rem; }
.example-item .q { font-weight: 600; color: var(--primary); margin-bottom: 6px; }
.example-item .a { color: var(--text-secondary); padding-top: 6px; border-top: 1px dashed var(--border); margin-top: 6px; display: none; }
.example-item .a.show { display: block; }
.toggle-answer { font-size: .78rem; color: var(--primary); cursor: pointer; background: none; border: none; padding: 4px 0; }
.practice-btn { width: 100%; margin-top: 16px; padding: 12px; font-size: 1rem; }

/* ── Stats Bar ── */
.stats-bar {
  height: 44px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 32px;
  font-size: .8rem;
  color: var(--text-secondary);
  flex-shrink: 0;
}
.stats-bar span strong { color: var(--text); }

/* ── Modal ── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.45);
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: fadeIn .2s ease;
}
.modal {
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
  width: 90%;
  max-width: 640px;
  max-height: 85vh;
  overflow-y: auto;
  animation: slideUp .25s ease;
}
.modal-header {
  padding: 20px 24px 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.modal-header h2 { font-size: 1.1rem; }
.modal-close { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text-secondary); padding: 4px 8px; border-radius: 6px; }
.modal-close:hover { background: var(--bg); }
.modal-body { padding: 20px 24px 24px; }
.modal-footer { padding: 0 24px 20px; display: flex; gap: 10px; justify-content: flex-end; }

/* ── Upload Zone ── */
.upload-zone {
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  padding: 40px;
  text-align: center;
  cursor: pointer;
  transition: var(--transition);
  margin-bottom: 16px;
}
.upload-zone:hover, .upload-zone.drag-over { border-color: var(--primary); background: var(--primary-light); }
.upload-zone .icon { font-size: 2.5rem; margin-bottom: 8px; }
.upload-zone p { font-size: .875rem; color: var(--text-secondary); }
.upload-section-select { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; font-size: .9rem; margin-bottom: 12px; background: var(--surface); }
.upload-hint { font-size: .78rem; color: var(--danger); margin-top: 6px; display: none; }

/* ── Practice Modal ── */
.practice-step { text-align: center; color: var(--text-secondary); font-size: .85rem; margin-bottom: 12px; }
.practice-question { font-size: 1rem; font-weight: 500; padding: 16px; background: var(--bg); border-radius: 8px; margin-bottom: 16px; line-height: 1.7; }
.practice-answer { padding: 16px; background: #f0fdf4; border-left: 3px solid var(--success); border-radius: 0 8px 8px 0; margin-bottom: 16px; display: none; line-height: 1.7; }
.practice-answer.show { display: block; }
.practice-actions { display: flex; gap: 10px; justify-content: center; margin-top: 12px; }
.practice-result { text-align: center; padding: 30px; }
.practice-result .score { font-size: 3rem; font-weight: 700; color: var(--primary); }
.practice-result .summary { font-size: 1rem; color: var(--text-secondary); margin: 8px 0 20px; }

/* ── Loading ── */
.loading-overlay {
  position: fixed;
  inset: 0;
  background: rgba(255,255,255,.85);
  z-index: 200;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
}
.spinner {
  width: 42px;
  height: 42px;
  border: 3px solid var(--border);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
.loading-text { font-size: .9rem; color: var(--text-secondary); }

/* ── Animations ── */
@keyframes fadeIn { from { opacity:0 } to { opacity:1 } }
@keyframes slideUp { from { opacity:0; transform:translateY(20px) } to { opacity:1; transform:translateY(0) } }
@keyframes spin { to { transform:rotate(360deg) } }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #9ca3af; }

/* ── Responsive ── */
@media (max-width: 900px) {
  .main { flex-direction: column; }
  .mindmap-panel { margin: 8px; height: 45vh; }
  .detail-panel { width: auto; margin: 0 8px 8px; max-height: 45vh; }
  .header { flex-wrap: wrap; height: auto; padding: 10px 12px; gap: 8px; }
  .section-tab { padding: 6px 12px; font-size: 0.8rem; }
}
</style>
</head>
<body>

<!-- ═══ Header ═══ -->
<header class="header">
  <h1>考研学习工具 v1.0</h1>
  <div class="section-tabs" id="sectionTabs">
    <button class="section-tab math active" data-section="math">📐 考研数学</button>
    <button class="section-tab english" data-section="english">📖 考研英语</button>
    <button class="section-tab politics" data-section="politics">📋 考研政治</button>
    <button class="section-tab cs" data-section="cs">💻 408计算机</button>
    <button class="section-tab bagu" data-section="bagu">📚 八股文</button>
  </div>
  <div class="toolbar">
    <button class="btn btn-outline btn-sm" id="btnExport">📥 导出数据</button>
    <button class="btn btn-outline btn-sm" id="btnImport">📤 导入数据</button>
    <button class="btn btn-primary" id="btnUpload">📄 上传PDF</button>

</header>

<!-- ═══ Main ═══ -->
<div class="main">

  <div class="detail-panel" id="detailPanel">

      <p style="font-size:.8rem;color:#cbd5e1">或上传PDF生成导图</p>
    </div>
    <div class="detail-content" id="detailContent">
      <div class="detail-title" id="detailTitle"></div>

      <button class="btn btn-primary practice-btn" id="btnPractice">🎯 开始练习（3道题）</button>
    </div>
  </div>
</div>

<!-- ═══ Stats Bar ═══ -->
<div class="stats-bar">
  <span>总节点: <strong id="statTotal">0</strong></span>
  <span>已练习: <strong id="statPracticed">0</strong></span>
  <span>当前板块: <strong id="statSection">考研数学</strong></span>
</div>

<!-- ═══ Hidden file input ═══ -->
<input type="file" id="fileInput" accept=".pdf" style="display:none">

<!-- ═══ Import file input ═══ -->
<input type="file" id="importInput" accept=".json" style="display:none">

// ═══════════════════════════════════════════
//  Utility Functions
// ═══════════════════════════════════════════
function $(sel) { return document.querySelector(sel); }
function $$(sel) { return document.querySelectorAll(sel); }
function uid() { return 'n_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8); }

function lsGet(key) {
  try { const v = localStorage.getItem(LS_PREFIX + key); return v ? JSON.parse(v) : null; }
  catch(e) { return null; }
}
function lsSet(key, val) {
  try { localStorage.setItem(LS_PREFIX + key, JSON.stringify(val)); }
  catch(e) { showToast('存储空间不足，请清理数据'); }
}

// ═══════════════════════════════════════════
//  Data Management
// ═══════════════════════════════════════════
function getSectionData(section) {
  let data = lsGet('section_' + section);
  if (!data) {
    data = JSON.parse(JSON.stringify(SECTION_TEMPLATES[section]));
    addIds(data);
    lsSet('section_' + section, data);
  }
  return data;
}

function saveSectionData(section, data) {
  lsSet('section_' + section, data);
}

function addIds(node) {
  node.id = uid();
  if (node.children) node.children.forEach(addIds);
}

function ensureIds(node) {
  if (!node.id) node.id = uid();
  if (node.children) node.children.forEach(ensureIds);
}

function getPracticeRecords(section) {
  return lsGet('practice_' + section) || {};
}

function savePracticeRecord(section, nodeId, score) {
  const records = getPracticeRecords(section);
  if (!records[nodeId]) records[nodeId] = [];
  records[nodeId].push({ date: Date.now(), score });
  lsSet('practice_' + section, records);
}

function getNodePracticeCount(section, nodeId) {
  const records = getPracticeRecords(section);
  return records[nodeId] ? records[nodeId].length : 0;
}

// ═══════════════════════════════════════════
//  Find node by ID in tree
// ═══════════════════════════════════════════
function findNode(tree, id) {
  if (!tree) return null;
  if (tree.id === id) return tree;
  if (tree.children) {
    for (const child of tree.children) {
      const found = findNode(child, id);
      if (found) return found;
    }
  }
  return null;
}

// ═══════════════════════════════════════════
//  Count total nodes
// ═══════════════════════════════════════════
function countNodes(node) {
  if (!node) return 0;
  let n = 1;
  if (node.children) node.children.forEach(c => n += countNodes(c));
  return n;
}

function countPracticedNodes(section) {
  const records = getPracticeRecords(section);
  return Object.keys(records).length;
}

function updateStats() {
  const total = countNodes(currentMindMap);
  const practiced = countPracticedNodes(currentSection);
  $('#statTotal').textContent = total;
  $('#statPracticed').textContent = practiced;
  $('#statSection').textContent = SECTION_LABELS[currentSection];
}

// ═══════════════════════════════════════════
//  Transform data for ECharts tree
// ═══════════════════════════════════════════
function toEChartsTree(node, depth = 0) {
  const result = { name: node.name, id: node.id };
  if (node.children && node.children.length > 0) {
    result.children = node.children.map(c => toEChartsTree(c, depth + 1));
  }
  if (depth >= 2) result.collapsed = true;
  return result;
}

// ═══════════════════════════════════════════
//  Render Mind Map
// ═══════════════════════════════════════════
function renderMindMap() {
  const container = $('#mindmapPanel');
  if (!chartInstance) {
    chartInstance = echarts.init(container);
    chartInstance.on('click', onNodeClick);
    window.addEventListener('resize', () => chartInstance && chartInstance.resize());
  }

  const option = {
    tooltip: { trigger: 'item', triggerOn: 'mousemove' },
    series: [{
      type: 'tree',
      data: [toEChartsTree(currentMindMap)],
      top: '5%', left: '8%', bottom: '5%', right: '15%',
      symbolSize: 10,
      orient: 'LR',
      label: {
        position: 'left', verticalAlign: 'middle', align: 'right',
        fontSize: 13, fontWeight: 500, color: '#1f2937'
      },
      leaves: { label: { position: 'right', verticalAlign: 'middle', align: 'left' } },
      emphasis: {
        focus: 'descendant',
        itemStyle: { color: '#4f46e5' }
      },
      expandAndCollapse: true,
      animationDuration: 400,
      animationDurationUpdate: 300,
      lineStyle: { color: '#cbd5e1', width: 1.5, curveness: 0.5 },
      roam: true
    }]
  };
  chartInstance.setOption(option, true);
}

// ═══════════════════════════════════════════
//  Node Click Handler
// ═══════════════════════════════════════════
function onNodeClick(params) {
  if (!params.data || !params.data.id) return;
  currentNodeId = params.data.id;
  const node = findNode(currentMindMap, currentNodeId);
  if (!node) return;
  showDetail(node);
}

function showDetail(node) {
  $('#detailEmpty').style.display = 'none';
  const content = $('#detailContent');
  content.classList.add('active');
  $('#detailTitle').textContent = '📖 ' + node.name;

  // Exam points
  const epDiv = $('#examPoints');
  if (node.examPoints && node.examPoints.length > 0) {
    epDiv.innerHTML = node.examPoints.map(p => `<div class="exam-point">${p}</div>`).join('');
  } else {
    epDiv.innerHTML = '<p style="color:var(--text-secondary);font-size:.85rem">暂无该节点的考点数据</p>';
  }

  // Examples
  const exDiv = $('#examples');
  if (node.examples && node.examples.length > 0) {
    exDiv.innerHTML = node.examples.map((ex, i) => `
      <div class="example-item">
        <div class="q">Q${i+1}: ${ex.q}</div>
        <div class="a" id="exampleAns${i}">💡 ${ex.a}</div>
        <button class="toggle-answer" data-idx="${i}">显示答案 ▾</button>
      </div>
    `).join('');
    exDiv.querySelectorAll('.toggle-answer').forEach(btn => {
      btn.addEventListener('click', function() {
        const idx = this.dataset.idx;
        const ans = $('#exampleAns' + idx);
        const isOpen = ans.classList.toggle('show');
        this.textContent = isOpen ? '收起答案 ▴' : '显示答案 ▾';
      });
    });
  } else {
    exDiv.innerHTML = '<p style="color:var(--text-secondary);font-size:.85rem">暂无该节点的例题数据</p>';
  }

  content.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// ═══════════════════════════════════════════
//  Practice Mode
// ═══════════════════════════════════════════
function openPractice() {
  if (!currentNodeId) return;
  const node = findNode(currentMindMap, currentNodeId);
  if (!node) return;

  const nodeName = node.name;
  // Pick questions from the bank based on section, plus any from the node itself
  const bank = PRACTICE_BANK[currentSection] || [];
  // Use node examples if available, otherwise sample from bank
  let questions = [];
  if (node.examples && node.examples.length >= 3) {
    questions = node.examples.slice(0, 3).map(ex => ({ q: ex.q, a: ex.a }));
  } else {
    const shuffled = [...bank].sort(() => Math.random() - 0.5);
    questions = shuffled.slice(0, 3);
  }
  // Fill shortfall
  if (questions.length < 3) {
    const more = [...bank].sort(() => Math.random() - 0.5);
    questions = [...questions, ...more.slice(0, 3 - questions.length)];
  }

  practiceState = { nodeId: currentNodeId, nodeName, questions, currentIndex: 0, results: [] };

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'practiceOverlay';
  overlay.innerHTML = `
    <div class="modal" style="max-width:560px">
      <div class="modal-header">
        <h2>🎯 练习模式 — ${nodeName}</h2>
        <button class="modal-close" onclick="closePractice()">✕</button>
      </div>
      <div class="modal-body" id="practiceBody"></div>
    </div>
  `;
  document.body.appendChild(overlay);
  renderPracticeQuestion();
}

function closePractice() {
  const overlay = $('#practiceOverlay');
  if (overlay) overlay.remove();
  practiceState = null;
}

function renderPracticeQuestion() {
  if (!practiceState) return;
  const { questions, currentIndex, results } = practiceState;

  const body = $('#practiceBody');
  if (!body) return;

  // Check if done
  if (currentIndex >= questions.length) {
    const correct = results.filter(r => r === 'correct').length;
    const total = results.length;
    body.innerHTML = `
      <div class="practice-result">
        <div class="score">${correct}/${total}</div>
        <div class="summary">正确率: ${Math.round(correct/total*100)}%</div>
        <div style="margin-bottom:16px;color:var(--text-secondary)">
          ${correct === total ? '太棒了，全部正确！🎉' : correct >= total/2 ? '不错，继续加油！💪' : '还需要多多练习哦！📚'}
        </div>
        <button class="btn btn-outline" onclick="closePractice()">关闭</button>
      </div>
    `;
    savePracticeRecord(currentSection, practiceState.nodeId, correct);
    updateStats();
    return;
  }

  const q = questions[currentIndex];
  const isRevealed = results[currentIndex] !== undefined;
  const answered = results[currentIndex];

  body.innerHTML = `
    <div class="practice-step">第 ${currentIndex + 1} / ${questions.length} 题</div>
    <div class="practice-question">${q.q}</div>
    <div class="practice-answer ${isRevealed ? 'show' : ''}" id="practiceAns">💡 ${q.a}</div>
    ${!isRevealed ? `
      <div class="practice-actions">
        <button class="btn btn-primary" onclick="revealAnswer()">显示答案</button>
      </div>
    ` : `
      <div style="text-align:center;font-size:.9rem;font-weight:500;margin-bottom:8px;color:${answered==='correct'?'var(--success)':'var(--danger)'}">
        你的自评: ${answered === 'correct' ? '✅ 正确' : '❌ 错误'}
      </div>
      <div class="practice-actions">
        ${currentIndex < questions.length - 1 ? `
          <button class="btn btn-success" onclick="nextQuestion()">下一题 →</button>
        ` : `
          <button class="btn btn-success" onclick="nextQuestion()">查看结果 →</button>
        `}
      </div>
      <div class="practice-actions" style="margin-top:8px">
        <button class="btn btn-outline btn-sm" onclick="retrySelfEval()">重新自评</button>
      </div>
    `}
  `;
}

function revealAnswer() {
  if (!practiceState) return;
  practiceState.results[practiceState.currentIndex] = null; // not yet self-evaluated
  renderPracticeQuestion();
  // Now update to show self-eval buttons
  const body = $('#practiceBody');
  const actionsDiv = body.querySelector('.practice-actions');
  if (actionsDiv) {
    actionsDiv.innerHTML = `
      <button class="btn btn-success" onclick="selfEval('correct')" style="flex:1">✅ 正确</button>
      <button class="btn" style="flex:1;background:var(--danger);color:#fff" onclick="selfEval('incorrect')">❌ 错误</button>
    `;
  }
}

function selfEval(result) {
  if (!practiceState) return;
  practiceState.results[practiceState.currentIndex] = result;
  renderPracticeQuestion();
}

function nextQuestion() {
  if (!practiceState) return;
  practiceState.currentIndex++;
  renderPracticeQuestion();
}

function retrySelfEval() {
  if (!practiceState) return;
  practiceState.results[practiceState.currentIndex] = undefined;
  renderPracticeQuestion();
  // Re-show eval buttons after a tick
  setTimeout(() => {
    const body = $('#practiceBody');
    if (!body) return;
    const actionsDiv = body.querySelector('.practice-actions');
    if (actionsDiv && practiceState && practiceState.results[practiceState.currentIndex] === undefined) {
      actionsDiv.innerHTML = `
        <button class="btn btn-success" onclick="selfEval('correct')" style="flex:1">✅ 正确</button>
        <button class="btn" style="flex:1;background:var(--danger);color:#fff" onclick="selfEval('incorrect')">❌ 错误</button>
      `;
    }
  }, 50);
}

// ═══════════════════════════════════════════
//  Toast
// ═══════════════════════════════════════════
function showToast(msg, duration = 2500) {
  const toast = document.createElement('div');
  toast.style.cssText = `
    position:fixed; bottom:40px; left:50%; transform:translateX(-50%);
    background:#1f2937; color:#fff; padding:12px 24px; border-radius:8px;
    font-size:.875rem; z-index:300; animation:slideUp .25s ease;
    box-shadow: 0 4px 12px rgba(0,0,0,.3);
  `;
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => { toast.style.opacity = '0'; toast.style.transition = 'opacity .3s'; setTimeout(() => toast.remove(), 300); }, duration);
}

// ═══════════════════════════════════════════
//  Loading Overlay
// ═══════════════════════════════════════════
function showLoading(text = '正在分析PDF，生成思维导图...') {
  const overlay = document.createElement('div');
  overlay.className = 'loading-overlay';
  overlay.id = 'loadingOverlay';
  overlay.innerHTML = `<div class="spinner"></div><div class="loading-text">${text}</div>`;
  document.body.appendChild(overlay);
}

function hideLoading() {
  const overlay = $('#loadingOverlay');
  if (overlay) overlay.remove();
}

// ═══════════════════════════════════════════
//  PDF Processing & Mock LLM
// ═══════════════════════════════════════════
async function processPDF(arrayBuffer, section) {
  const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  const totalPages = pdf.numPages;

  // Extract text from first 10 pages (for demo performance)
  const pagesToRead = Math.min(totalPages, 10);
  let extractedText = '';
  for (let i = 1; i <= pagesToRead; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    const pageText = content.items.map(item => item.str).join(' ');
    extractedText += pageText + '\n';
  }

  // Simulate LLM processing delay (2-5 seconds)
  const delay = 2000 + Math.random() * 3000;
  await new Promise(r => setTimeout(r, delay));

  // Generate mind map based on section + extracted keywords
  const newMindMap = generateMockMindMap(section, extractedText, totalPages);
  addIds(newMindMap);

  return newMindMap;
}

function generateMockMindMap(section, text, pageCount) {
  // Start from base template
  const base = JSON.parse(JSON.stringify(SECTION_TEMPLATES[section]));

  // Simulate "LLM" customization based on extracted text
  const lowerText = text.toLowerCase();

  // Detect some topics from text to vary the result
  const topicDetectors = {
    math: ['极限', '导数', '积分', '矩阵', '概率', '微分方程', '特征值', '行列式'],
    english: ['reading', 'writing', 'translation', 'vocabulary', 'grammar', 'essay'],
    politics: ['矛盾', '实践', '社会主义', '现代化', '价值', '人民', '发展'],
    cs: ['算法', '数据结构', '排序', '进程', 'TCP', 'Cache', '操作系', '网络'],
    bagu: ['闭包', 'Promise', 'React', 'CSS', 'HTTP', '原型', 'async', '组件']
  };

  const detectors = topicDetectors[section] || [];
  const matchedTopics = detectors.filter(t => lowerText.includes(t.toLowerCase()));

  // If we found matching topics, add a "从PDF抽取" marker node
  if (matchedTopics.length > 0 && base.children.length > 0) {
    const extractedNode = {
      name: `📄 PDF抽取要点 (${pageCount}页)`,
      children: matchedTopics.slice(0, 5).map(t => ({
        name: t + ' (从PDF识别)',
        examPoints: ['该知识点在历年考试中出现频率较高', '注意与其他知识点的综合运用', '建议结合真题进行针对性训练'],
        examples: [{ q: `关于"${t}"的典型题目（基于PDF内容生成）`, a: `参考教材中关于${t}的详细讲解与例题解析` }]
      }))
    };
    base.children.push(extractedNode);
  }

  return base;
}

// ═══════════════════════════════════════════
//  Merge mind maps (incremental upload)
// ═══════════════════════════════════════════
function mergeMindMaps(existing, incoming) {
  if (!existing) return incoming;
  if (!incoming) return existing;

  const merged = JSON.parse(JSON.stringify(existing));
  ensureIds(merged);

  // Merge children by name
  const existingChildNames = new Map();
  if (merged.children) {
    merged.children.forEach(c => existingChildNames.set(c.name, c));
  } else {
    merged.children = [];
  }

  if (incoming.children) {
    for (const incChild of incoming.children) {
      if (existingChildNames.has(incChild.name)) {
        // Merge children of this child
        const existChild = existingChildNames.get(incChild.name);
        if (incChild.children && incChild.children.length > 0) {
          if (!existChild.children) existChild.children = [];
          const existSubNames = new Set(existChild.children.map(c => c.name));
          for (const sub of incChild.children) {
            if (!existSubNames.has(sub.name)) {
              existChild.children.push(sub);
            }
          }
        }
      } else {
        // New top-level topic
        merged.children.push(incChild);
      }
    }
  }

  return merged;
}

// ═══════════════════════════════════════════
//  Upload PDF Flow
// ═══════════════════════════════════════════
function triggerUpload() {
  $('#fileInput').click();
}

async function handleFileSelect(e) {
  const file = e.target.files[0];
  if (!file) return;
  e.target.value = '';

  // Show upload modal to confirm section
  showUploadModal(file);
}

function showUploadModal(file) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'uploadModal';
  overlay.innerHTML = `
    <div class="modal">
      <div class="modal-header">
        <h2>📄 上传PDF</h2>
        <button class="modal-close" onclick="closeUploadModal()">✕</button>
      </div>
      <div class="modal-body">
        <p style="margin-bottom:12px;font-size:.9rem">文件: <strong>${file.name}</strong> (${(file.size/1024/1024).toFixed(2)} MB)</p>
        <label style="font-size:.875rem;font-weight:500;display:block;margin-bottom:6px;">选择导入板块:</label>
        <select class="upload-section-select" id="uploadSectionSelect">
          ${SECTIONS.map(s => `<option value="${s}" ${s === currentSection ? 'selected' : ''}>${SECTION_LABELS[s]}</option>`).join('')}
        </select>
        <div class="upload-hint" id="uploadHint">文件页数超过100页，无法处理</div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeUploadModal()">取消</button>
        <button class="btn btn-primary" id="confirmUpload">开始上传与分析</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);

  $('#confirmUpload').addEventListener('click', async () => {
    const section = $('#uploadSectionSelect').value;
    closeUploadModal();
    await doUpload(file, section);
  });
}

function closeUploadModal() {
  const overlay = $('#uploadModal');
  if (overlay) overlay.remove();
}

async function doUpload(file, section) {
  showLoading('正在解析PDF并提取文本...');

  try {
    // Check page count first
    const arrayBuffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    const totalPages = pdf.numPages;

    if (totalPages > 100) {
      hideLoading();
      showToast('文件页数超过100页，请上传100页以内的PDF');
      return;
    }

    if (totalPages === 0) {
      hideLoading();
      showToast('PDF文件为空，请上传有效文件');
      return;
    }

    // Process PDF and generate mind map (loading stays visible inside)
    const newMindMap = await processPDF(arrayBuffer, section);

    // Merge with existing
    const existing = getSectionData(section);
    const merged = mergeMindMaps(existing, newMindMap);
    saveSectionData(section, merged);

    // Switch to the section if needed
    if (currentSection !== section) {
      switchSection(section);
    } else {
      currentMindMap = merged;
      renderMindMap();
      updateStats();
    }

    hideLoading();
    showToast(`PDF分析完成！已生成 ${countNodes(newMindMap)} 个知识点节点`);
  } catch (err) {
    hideLoading();
    console.error('Upload error:', err);
    showToast('PDF处理失败: ' + (err.message || '未知错误'));
  }
}

// ═══════════════════════════════════════════
//  Section Switching
// ═══════════════════════════════════════════
function switchSection(section) {
  currentSection = section;
  currentMindMap = getSectionData(section);
  currentNodeId = null;

  // Update tabs
  $$('.section-tab').forEach(tab => tab.classList.remove('active'));
  const activeTab = document.querySelector(`.section-tab[data-section="${section}"]`);
  if (activeTab) activeTab.classList.add('active');

  // Reset detail
  $('#detailContent').classList.remove('active');
  $('#detailEmpty').style.display = 'flex';

  // Save section preference
  lsSet('current_section', section);

  renderMindMap();
  updateStats();
}

// ═══════════════════════════════════════════
//  Export / Import
// ═══════════════════════════════════════════
function exportAllData() {
  const allData = {};
  SECTIONS.forEach(s => {
    allData[s] = getSectionData(s);
  });
  allData._practice = {};
  SECTIONS.forEach(s => {
    allData._practice[s] = getPracticeRecords(s);
  });

  const blob = new Blob([JSON.stringify(allData, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `study_tool_backup_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('数据导出成功');
}

function triggerImport() {
  $('#importInput').click();
}

function handleImport(e) {
  const file = e.target.files[0];
  if (!file) return;
  e.target.value = '';

  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const data = JSON.parse(ev.target.result);
      let imported = 0;
      SECTIONS.forEach(s => {
        if (data[s]) {
          saveSectionData(s, data[s]);
          imported++;
        }
      });
      if (data._practice) {
        SECTIONS.forEach(s => {
          if (data._practice[s]) {
            lsSet('practice_' + s, data._practice[s]);
          }
        });
      }
      // Reload current section
      switchSection(currentSection);
      showToast(`导入完成: ${imported} 个板块的数据已恢复`);
    } catch (err) {
      showToast('导入失败: 文件格式错误');
    }
  };
  reader.readAsText(file);
}

// ═══════════════════════════════════════════
//  Initialize
// ═══════════════════════════════════════════
function init() {
  // Restore last section
  const savedSection = lsGet('current_section');
  if (savedSection && SECTIONS.includes(savedSection)) {
    currentSection = savedSection;
  }

  // Load data
  currentMindMap = getSectionData(currentSection);
  ensureIds(currentMindMap);

  // Set active tab
  $$('.section-tab').forEach(tab => {
    tab.classList.remove('active');
    if (tab.dataset.section === currentSection) tab.classList.add('active');
  });

  // Render
  renderMindMap();
  updateStats();

  // Event listeners
  $('#sectionTabs').addEventListener('click', e => {
    const tab = e.target.closest('.section-tab');
    if (!tab) return;
    switchSection(tab.dataset.section);
  });

  $('#btnUpload').addEventListener('click', triggerUpload);
  $('#fileInput').addEventListener('change', handleFileSelect);
  $('#btnExport').addEventListener('click', exportAllData);
  $('#btnImport').addEventListener('click', triggerImport);
  $('#importInput').addEventListener('change', handleImport);
  $('#btnPractice').addEventListener('click', openPractice);

  // Close modals on overlay click
  document.addEventListener('click', e => {
    if (e.target.classList.contains('modal-overlay')) {
      if (e.target.id === 'practiceOverlay') closePractice();
      if (e.target.id === 'uploadModal') closeUploadModal();
    }
  });

  // Keyboard shortcuts
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      closePractice();
      closeUploadModal();
    }
    // Ctrl+1..5 to switch sections
    if (e.ctrlKey && e.key >= '1' && e.key <= '5') {
      e.preventDefault();
      const idx = parseInt(e.key) - 1;
      switchSection(SECTIONS[idx]);
    }
  });
}

// Start
document.addEventListener('DOMContentLoaded', init);
</script>
