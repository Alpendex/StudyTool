<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#4f46e5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="考研学习">
<meta name="description" content="考研学习思维导图工具 - PDF导入、题库管理、练习模式">
<link rel="manifest" href="./manifest.json">
<link rel="icon" type="image/svg+xml" href="./icon.svg">
<link rel="apple-touch-icon" href="./icon.svg">
<title>考研学习工具 v2.0</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
:root {
  --bg:#f0f2f5; --surface:#fff; --border:#e5e7eb; --text:#1f2937; --text2:#6b7280;
  --primary:#4f46e5; --primary-light:#eef2ff; --success:#10b981; --danger:#ef4444;
  --warning:#f59e0b; --info:#3b82f6;
  --math:#3b82f6; --english:#10b981; --politics:#ef4444; --cs:#8b5cf6; --bagu:#f59e0b;
  --custom:#6366f1; --radius:10px; --shadow:0 1px 3px rgba(0,0,0,.08);
  --shadow-lg:0 10px 30px rgba(0,0,0,.12); --transition:.2s ease;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:3px}

/* ── Header ── */
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:56px;flex-shrink:0;z-index:20;box-shadow:var(--shadow)}
.header h1{font-size:1.15rem;font-weight:700;background:linear-gradient(135deg,#4f46e5,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;white-space:nowrap}
.header-left,.header-right{display:flex;align-items:center;gap:8px}

/* ── Section Tabs ── */
.section-tabs{display:flex;align-items:center;gap:3px;background:var(--bg);border-radius:8px;padding:3px;overflow-x:auto;max-width:55vw}
.section-tab{padding:6px 14px;border-radius:6px;border:none;cursor:pointer;font-size:.8rem;font-weight:500;color:var(--text2);background:transparent;transition:var(--transition);white-space:nowrap;position:relative}
.section-tab:hover{color:var(--text);background:rgba(255,255,255,.6)}
.section-tab.active{color:#fff;font-weight:600}
.section-tab[data-color="math"].active{background:var(--math)}
.section-tab[data-color="english"].active{background:var(--english)}
.section-tab[data-color="politics"].active{background:var(--politics)}
.section-tab[data-color="cs"].active{background:var(--cs)}
.section-tab[data-color="bagu"].active{background:var(--bagu)}
.section-tab.custom-tab[data-color].active{background:var(--custom)}
.section-tab .tab-del{display:none;margin-left:4px;font-size:.7rem;opacity:.6;cursor:pointer}
.section-tab.custom-tab:hover .tab-del{display:inline}
.section-tab .tab-del:hover{opacity:1;color:#fff}
.btn-add-section{padding:6px 10px;border-radius:6px;border:1px dashed var(--border);cursor:pointer;font-size:.85rem;color:var(--text2);background:transparent;transition:var(--transition);white-space:nowrap}
.btn-add-section:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-light)}

/* ── Buttons ── */
.btn{padding:7px 15px;border-radius:7px;border:none;cursor:pointer;font-size:.82rem;font-weight:500;display:inline-flex;align-items:center;gap:5px;transition:var(--transition);white-space:nowrap}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:#4338ca}
.btn-outline{background:var(--surface);color:var(--text);border:1px solid var(--border)}.btn-outline:hover{background:var(--bg)}
.btn-sm{padding:4px 10px;font-size:.75rem}
.btn-success{background:var(--success);color:#fff}.btn-success:hover{background:#059669}
.btn-danger{background:var(--danger);color:#fff}.btn-danger:hover{background:#dc2626}
.btn-warning{background:var(--warning);color:#fff}.btn-warning:hover{background:#d97706}
.btn-xs{padding:2px 8px;font-size:.7rem;border-radius:4px}
.icon-btn{background:none;border:none;cursor:pointer;color:var(--text2);padding:4px 6px;border-radius:4px;font-size:.9rem;transition:var(--transition)}
.icon-btn:hover{background:var(--bg);color:var(--text)}
.icon-btn.danger:hover{background:#fef2f2;color:var(--danger)}

/* ── Main Layout ── */
.main{display:flex;flex:1;overflow:hidden}
.mindmap-panel{flex:1;min-width:0;background:var(--surface);margin:12px 0 12px 12px;border-radius:var(--radius);box-shadow:var(--shadow);position:relative;overflow:hidden}
.mindmap-panel .chart-context-menu{position:absolute;background:var(--surface);border:1px solid var(--border);border-radius:8px;box-shadow:var(--shadow-lg);z-index:50;min-width:140px;display:none;overflow:hidden}
.mindmap-panel .chart-context-menu .menu-item{padding:10px 16px;cursor:pointer;font-size:.82rem;display:flex;align-items:center;gap:8px;transition:var(--transition)}
.mindmap-panel .chart-context-menu .menu-item:hover{background:var(--primary-light);color:var(--primary)}

.detail-panel{width:440px;flex-shrink:0;margin:12px;background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);overflow-y:auto;display:flex;flex-direction:column}
.detail-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text2);padding:40px;text-align:center;gap:10px}
.detail-empty .icon{font-size:2.5rem;opacity:.4}
.detail-content{padding:20px;display:none}
.detail-content.active{display:block}
.detail-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;gap:8px}
.detail-title{font-size:1rem;font-weight:700;color:var(--primary);flex:1;word-break:break-all}
.detail-title-input{font-size:1rem;font-weight:700;color:var(--primary);border:1px solid var(--primary);border-radius:6px;padding:4px 8px;width:100%;display:none;outline:none}
.detail-actions{display:flex;gap:4px;flex-shrink:0}
.detail-meta{font-size:.75rem;color:var(--text2);margin-bottom:14px;padding:8px 12px;background:var(--bg);border-radius:6px;display:none}
.detail-meta.show{display:block}
.detail-section{margin-bottom:18px}
.detail-section h3{font-size:.85rem;font-weight:600;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:6px}
.detail-section h3 span{display:flex;align-items:center;gap:5px}

.exam-point{display:flex;align-items:center;gap:8px;padding:6px 10px;margin-bottom:4px;background:#fffbeb;border-left:3px solid var(--warning);border-radius:0 5px 5px 0;font-size:.82rem;transition:var(--transition)}
.exam-point:hover{background:#fef3c7}
.exam-point .ep-text{flex:1}
.exam-point .ep-del{opacity:0;cursor:pointer;color:var(--danger);font-size:.85rem;transition:var(--transition)}
.exam-point:hover .ep-del{opacity:1}
.add-ep{display:flex;gap:6px;margin-top:6px}
.add-ep input{flex:1;padding:5px 10px;border:1px solid var(--border);border-radius:6px;font-size:.8rem;outline:none}
.add-ep input:focus{border-color:var(--primary)}

.question-item{padding:10px 12px;background:#f8fafc;border-radius:7px;margin-bottom:6px;font-size:.82rem;border-left:3px solid var(--info)}
.question-item .q-type{display:inline-block;padding:1px 6px;border-radius:3px;font-size:.68rem;font-weight:600;margin-right:6px}
.q-type.简答{background:#dbeafe;color:#1d4ed8}
.q-type.选择{background:#fce7f3;color:#be185d}
.q-type.填空{background:#d1fae5;color:#047857}
.question-item .q-text{margin:6px 0;line-height:1.5}
.question-item .q-answer{color:var(--text2);font-size:.78rem;padding-top:6px;border-top:1px dashed var(--border);margin-top:6px;display:none}
.question-item .q-answer.show{display:block}
.question-item .q-toggle{cursor:pointer;color:var(--primary);font-size:.75rem;background:none;border:none;padding:2px 0}

.btn-practice-full{width:100%;margin-top:14px;padding:10px;font-size:.95rem}

/* ── Stats Bar ── */
.stats-bar{height:36px;background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:24px;font-size:.75rem;color:var(--text2);flex-shrink:0}
.stats-bar strong{color:var(--text)}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s}
.modal{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow-lg);max-width:720px;width:92%;max-height:85vh;display:flex;flex-direction:column;animation:slideUp .25s}
.modal.wide{max-width:900px}
.modal-header{padding:18px 20px 0;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.modal-header h2{font-size:1.05rem}
.modal-close{background:none;border:none;font-size:1.3rem;cursor:pointer;color:var(--text2);padding:4px 8px;border-radius:6px}
.modal-close:hover{background:var(--bg)}
.modal-body{padding:16px 20px 20px;overflow-y:auto;flex:1}
.modal-footer{padding:0 20px 16px;display:flex;gap:8px;justify-content:flex-end;flex-shrink:0}

/* ── Upload Zone ── */
.upload-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:32px;text-align:center;cursor:pointer;transition:var(--transition);margin-bottom:14px}
.upload-zone:hover,.upload-zone.drag-over{border-color:var(--primary);background:var(--primary-light)}
.upload-zone .icon{font-size:2.5rem;margin-bottom:6px}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:.82rem;font-weight:500;margin-bottom:4px}
.form-control{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:7px;font-size:.85rem;font-family:inherit;outline:none}
.form-control:focus{border-color:var(--primary)}
textarea.form-control{resize:vertical;min-height:60px}
.form-row{display:flex;gap:10px}
.form-row .form-group{flex:1}

/* ── Question Bank Table ── */
.qbank-filters{display:flex;gap:8px;margin-bottom:14px;align-items:center;flex-wrap:wrap}
.qbank-filters select,.qbank-filters input{font-size:.8rem;padding:5px 10px;border:1px solid var(--border);border-radius:6px;outline:none}
.qbank-filters input{flex:1;min-width:120px}
.qbank-table{width:100%;border-collapse:collapse;font-size:.8rem}
.qbank-table th,.qbank-table td{padding:8px 10px;text-align:left;border-bottom:1px solid var(--border)}
.qbank-table th{font-weight:600;background:var(--bg);position:sticky;top:0;z-index:1}
.qbank-table tbody tr:hover{background:#fafbfc}
.qbank-table .qbank-actions{display:flex;gap:4px}
.empty-row td{text-align:center;color:var(--text2);padding:24px}

/* ── Practice ── */
.practice-step{text-align:center;color:var(--text2);font-size:.8rem;margin-bottom:10px}
.practice-question{font-size:.95rem;font-weight:500;padding:14px;background:var(--bg);border-radius:8px;margin-bottom:14px;line-height:1.7}
.practice-answer{padding:14px;background:#f0fdf4;border-left:3px solid var(--success);border-radius:0 8px 8px 0;margin-bottom:14px;display:none;line-height:1.7}
.practice-answer.show{display:block}
.practice-actions{display:flex;gap:8px;justify-content:center;margin-top:10px;flex-wrap:wrap}
.practice-result{text-align:center;padding:30px}
.practice-result .score{font-size:3rem;font-weight:700;color:var(--primary)}
.practice-result .summary{font-size:1rem;color:var(--text2);margin:6px 0 18px}

/* ── Loading ── */
.loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,.85);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite}

/* ── Toast ── */
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1f2937;color:#fff;padding:10px 22px;border-radius:8px;font-size:.82rem;z-index:300;animation:slideUp .25s;box-shadow:0 4px 12px rgba(0,0,0,.25)}

/* ── Install Banner ── */
.install-banner{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:14px 20px;z-index:90;display:none;align-items:center;justify-content:space-between;gap:14px;box-shadow:0 -2px 12px rgba(0,0,0,.08);animation:slideUp .3s ease}
.install-banner.show{display:flex}
.install-banner .ib-info{display:flex;align-items:center;gap:12px}
.install-banner .ib-icon{width:44px;height:44px;border-radius:10px;background:linear-gradient(135deg,#4f46e5,#7c3aed);display:flex;align-items:center;justify-content:center;font-size:1.4rem;color:#fff;flex-shrink:0}
.install-banner .ib-text{font-size:.82rem}
.install-banner .ib-text strong{display:block;font-size:.88rem;color:var(--text)}
.install-banner .ib-actions{display:flex;gap:8px;align-items:center;flex-shrink:0}
.install-banner .ib-dismiss{background:none;border:none;font-size:1.2rem;cursor:pointer;color:var(--text2);padding:4px}
.install-banner .ib-dismiss:hover{color:var(--text)}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:860px){
  .main{flex-direction:column}
  .mindmap-panel{margin:6px;height:40vh}
  .detail-panel{width:auto;margin:0 6px 6px;max-height:40vh}
  .section-tabs{max-width:40vw}
  .header{padding:6px 10px;gap:4px;flex-wrap:wrap;height:auto;min-height:48px}
  .header h1{font-size:.95rem}
}
</style>
</head>
<body>

<!-- ═══ Header ═══ -->
<header class="header">
  <div class="header-left">
    <h1>考研学习工具 v2.0</h1>
  </div>
  <div class="section-tabs" id="sectionTabs"></div>
  <button class="btn-add-section" id="btnAddSection" title="创建新板块">＋ 新建板块</button>
  <div class="header-right">
    <button class="btn btn-outline btn-sm" id="btnQuestionBank">📋 题库管理</button>
    <button class="btn btn-outline btn-sm" id="btnExport">📥 导出</button>
    <button class="btn btn-outline btn-sm" id="btnImport">📤 导入</button>
    <button class="btn btn-primary btn-sm" id="btnUpload">📄 上传PDF</button>
  </div>
</header>

<!-- ═══ Main ═══ -->
<div class="main">
  <div class="mindmap-panel" id="mindmapPanel">
    <div class="chart-context-menu" id="chartContextMenu">
      <div class="menu-item" data-action="addChild">➕ 添加子节点</div>
      <div class="menu-item" data-action="edit">✏️ 编辑名称</div>
      <div class="menu-item" data-action="delete" style="color:var(--danger)">🗑️ 删除节点</div>
    </div>
  </div>
  <div class="detail-panel" id="detailPanel">
    <div class="detail-empty" id="detailEmpty">
      <div class="icon">👆</div>
      <p>点击思维导图节点查看详情</p>
      <p style="font-size:.78rem;color:#cbd5e1">右键节点可编辑</p>
    </div>
    <div class="detail-content" id="detailContent">
      <div class="detail-header">
        <div class="detail-title" id="detailTitle"></div>
        <input class="detail-title-input" id="detailTitleInput">
        <div class="detail-actions">
          <button class="icon-btn" id="btnEditNode" title="编辑名称">✏️</button>
          <button class="icon-btn" id="btnAddChild" title="添加子节点">➕</button>
          <button class="icon-btn danger" id="btnDeleteNode" title="删除节点">🗑️</button>
        </div>
      </div>
      <div class="detail-meta" id="detailMeta"></div>

      <div class="detail-section">
        <h3><span>📌 高频考点</span><button class="btn btn-outline btn-xs" id="btnAddExamPoint">＋ 添加</button></h3>
        <div id="examPoints"></div>
        <div class="add-ep" id="addEpForm" style="display:none">
          <input type="text" id="newEpInput" placeholder="输入新考点...">
          <button class="btn btn-primary btn-xs" id="btnSaveEp">保存</button>
          <button class="btn btn-outline btn-xs" id="btnCancelEp">取消</button>
        </div>
      </div>

      <div class="detail-section">
        <h3>📝 关联题目 <span style="font-weight:400;font-size:.75rem;color:var(--text2)" id="relQuestionCount"></span></h3>
        <div id="relQuestions"><p style="color:var(--text2);font-size:.78rem">暂无关联题目</p></div>
      </div>

      <button class="btn btn-primary btn-practice-full" id="btnPractice">🎯 开始练习（3道题）</button>
      <button class="btn btn-outline btn-sm btn-practice-full" id="btnAddQuestionForNode" style="margin-top:6px">＋ 为该节点添加题目</button>
    </div>
  </div>
</div>

<!-- ═══ Stats Bar ═══ -->
<div class="stats-bar">
  <span>节点: <strong id="statNodes">0</strong></span>
  <span>题库: <strong id="statQuestions">0</strong></span>
  <span>已练习: <strong id="statPracticed">0</strong> 次</span>
  <span>板块: <strong id="statSection">—</strong></span>
</div>

<!-- ═══ Install Banner ═══ -->
<div class="install-banner" id="installBanner">
  <div class="ib-info">
    <div class="ib-icon">📚</div>
    <div class="ib-text">
      <strong>添加到主屏幕</strong>
      随时随地刷题学习，无需打开浏览器
    </div>
  </div>
  <div class="ib-actions">
    <button class="btn btn-primary btn-sm" id="btnInstall">安装应用</button>
    <button class="ib-dismiss" id="btnDismissInstall" title="关闭">✕</button>
  </div>
</div>

<!-- ═══ Hidden inputs ═══ -->
<input type="file" id="fileInput" accept=".pdf" style="display:none">
<input type="file" id="importInput" accept=".json" style="display:none">

<script>
// ═══════════════════════════════════════════════════════════
//  PDF.js worker
// ═══════════════════════════════════════════════════════════
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ═══════════════════════════════════════════════════════════
//  Constants
// ═══════════════════════════════════════════════════════════
const LS = 'st2_';
const DEFAULT_SECTIONS = [
  { id:'math', name:'考研数学', color:'math', isDefault:true },
  { id:'english', name:'考研英语', color:'english', isDefault:true },
  { id:'politics', name:'考研政治', color:'politics', isDefault:true },
  { id:'cs', name:'408计算机', color:'cs', isDefault:true },
  { id:'bagu', name:'八股文', color:'bagu', isDefault:true },
];
const QUESTION_TYPES = ['简答','选择','填空'];

// ═══════════════════════════════════════════════════════════
//  State
// ═══════════════════════════════════════════════════════════
let sections = [];
let currentSectionId = 'math';
let currentMindMap = null;
let currentNodeId = null;
let chartInstance = null;
let practiceState = null;

// ═══════════════════════════════════════════════════════════
//  Helpers
// ═══════════════════════════════════════════════════════════
function $(s,d){return(d||document).querySelector(s)}
function $$(s,d){return(d||document).querySelectorAll(s)}
function uid(){return 'n'+Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function qid(){return 'q'+Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

function lsGet(k){try{const v=localStorage.getItem(LS+k);return v?JSON.parse(v):null}catch(e){return null}}
function lsSet(k,v){try{localStorage.setItem(LS+k,JSON.stringify(v))}catch(e){toast('存储空间不足')}}

function toast(msg,dur=2200){
  const el=document.createElement('div');el.className='toast';el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>{el.style.opacity='0';el.style.transition='opacity .3s';setTimeout(()=>el.remove(),300)},dur);
}

// ═══════════════════════════════════════════════════════════
//  Section Management
// ═══════════════════════════════════════════════════════════
function loadSections(){
  sections = lsGet('sections') || JSON.parse(JSON.stringify(DEFAULT_SECTIONS));
  // ensure defaults exist
  DEFAULT_SECTIONS.forEach(ds=>{if(!sections.find(s=>s.id===ds.id)) sections.unshift({...ds})});
  saveSections();
}
function saveSections(){lsSet('sections',sections)}
function getSectionById(id){return sections.find(s=>s.id===id)}

function createSection(name){
  if(!name.trim()){toast('请输入板块名称');return}
  if(sections.find(s=>s.name===name.trim())){toast('板块名称已存在');return}
  const sec={id:uid(),name:name.trim(),color:'custom',isDefault:false};
  sections.push(sec);
  saveSections();
  // create empty mindmap for the new section
  const emptyMap={name:sec.name,children:[],id:uid()};
  saveMindMap(sec.id,emptyMap);
  saveQuestionBank(sec.id,[]);
  switchSection(sec.id);
  renderSectionTabs();
  toast(`板块「${sec.name}」已创建`);
}

function deleteSection(id){
  const sec=getSectionById(id);
  if(!sec)return;
  if(sec.isDefault){toast('默认板块不可删除');return}
  const qs=getQuestionBank(id);
  if(qs.length>0){
    if(!confirm(`板块「${sec.name}」包含 ${qs.length} 道题目，删除后无法恢复。确定删除？`))return;
  }
  sections=sections.filter(s=>s.id!==id);
  saveSections();
  // clean data
  localStorage.removeItem(LS+'mm_'+id);
  localStorage.removeItem(LS+'qb_'+id);
  localStorage.removeItem(LS+'pr_'+id);
  if(currentSectionId===id) switchSection('math');
  renderSectionTabs();
  toast(`板块「${sec.name}」已删除`);
}

function switchSection(id){
  currentSectionId=id;
  currentNodeId=null;
  currentMindMap=getMindMap(id);
  ensureIds(currentMindMap);
  lsSet('currentSection',id);
  renderSectionTabs();
  renderMindMap();
  updateStats();
  clearDetail();
}

function getMindMap(sectionId){
  let data=lsGet('mm_'+sectionId);
  if(!data){
    const tpl=MOCK_TEMPLATES[sectionId];
    if(tpl){data=JSON.parse(JSON.stringify(tpl));addIds(data)}
    else{data={name:getSectionById(sectionId)?.name||'新板块',children:[],id:uid()}}
    saveMindMap(sectionId,data);
  }
  return data;
}
function saveMindMap(sectionId,data){lsSet('mm_'+sectionId,data)}
function addIds(node){node.id=uid();if(node.children)node.children.forEach(addIds)}
function ensureIds(node){if(!node.id)node.id=uid();if(node.children)node.children.forEach(ensureIds)}

function findNode(tree,id){
  if(!tree)return null;
  if(tree.id===id)return tree;
  if(tree.children)for(const c of tree.children){const f=findNode(c,id);if(f)return f}
  return null;
}
function findParent(tree,id,parent=null){
  if(!tree)return null;
  if(tree.children)for(const c of tree.children){if(c.id===id)return tree;const f=findParent(c,id,c);if(f)return f}
  return null;
}
function countNodes(node){if(!node)return 0;let n=1;if(node.children)node.children.forEach(c=>n+=countNodes(c));return n}
function countAllNodes(tree){if(!tree)return 0;let n=1;if(tree.children)tree.children.forEach(c=>n+=countAllNodes(c));return n}

function toEChartsTree(node,depth=0){
  const r={name:node.name,id:node.id,value:node.name};
  if(node.children&&node.children.length>0)r.children=node.children.map(c=>toEChartsTree(c,depth+1));
  if(depth>=2)r.collapsed=true;
  return r;
}

function renderMindMap(){
  const container=$('#mindmapPanel');
  if(!chartInstance){chartInstance=echarts.init(container);window.addEventListener('resize',()=>chartInstance?.resize())}
  chartInstance.off('click');chartInstance.off('contextmenu');
  chartInstance.on('click',onChartClick);
  chartInstance.on('contextmenu',onChartContextMenu);

  const option={
    tooltip:{trigger:'item',triggerOn:'mousemove',formatter:p=>p.name},
    series:[{
      type:'tree',data:[toEChartsTree(currentMindMap)],
      top:'5%',left:'6%',bottom:'5%',right:'18%',
      symbolSize:9,orient:'LR',
      label:{position:'left',verticalAlign:'middle',align:'right',fontSize:12,fontWeight:500,color:'#1f2937'},
      leaves:{label:{position:'right',verticalAlign:'middle',align:'left'}},
      emphasis:{focus:'descendant',itemStyle:{color:'#4f46e5',borderWidth:2}},
      expandAndCollapse:true,animationDuration:350,animationDurationUpdate:250,
      lineStyle:{color:'#cbd5e1',width:1.3,curveness:.5},
      roam:'move'
    }]
  };
  chartInstance.setOption(option,true);
}

function onChartClick(params){
  if(!params.data?.id)return;
  currentNodeId=params.data.id;
  showDetail(findNode(currentMindMap,currentNodeId));
}

function onChartContextMenu(params){
  params.event.event.preventDefault();
  if(!params.data?.id)return;
  currentNodeId=params.data.id;
  const menu=$('#chartContextMenu');
  const rect=$('#mindmapPanel').getBoundingClientRect();
  menu.style.display='block';
  menu.style.left=(params.event.event.clientX-rect.left+5)+'px';
  menu.style.top=(params.event.event.clientY-rect.top-10)+'px';
  setTimeout(()=>document.addEventListener('click',hideContextMenu,{once:true}),0);
}
function hideContextMenu(){$('#chartContextMenu').style.display='none'}

function showDetail(node){
  if(!node)return;
  $('#detailEmpty').style.display='none';
  $('#detailContent').classList.add('active');
  $('#detailTitle').textContent=node.name;
  $('#detailTitleInput').style.display='none';
  $('#detailTitle').style.display='';

  // Metadata
  const meta=$('#detailMeta');
  if(node.sourceFile||node.createdAt){
    meta.classList.add('show');
    let html='';
    if(node.sourceFile)html+=`📄 来源: <strong>${esc(node.sourceFile)}</strong> `;
    if(node.createdAt)html+=`🕒 导入: ${new Date(node.createdAt).toLocaleString('zh-CN')}`;
    if(node._childCount!==undefined)html+=` | 📎 含 ${node._childCount} 个子节点`;
    meta.innerHTML=html;
  }else{meta.classList.remove('show')}

  // Exam points
  renderExamPoints(node);

  // Related questions
  renderRelatedQuestions(node);
}

function clearDetail(){
  $('#detailContent').classList.remove('active');
  $('#detailEmpty').style.display='flex';
  currentNodeId=null;
}

function renderExamPoints(node){
  const epDiv=$('#examPoints');
  const pts=node.examPoints||[];
  if(pts.length===0){epDiv.innerHTML='<p style="color:var(--text2);font-size:.78rem">暂无考点</p>';return}
  epDiv.innerHTML=pts.map((p,i)=>`
    <div class="exam-point">
      <span class="ep-text">${esc(p)}</span>
      <span class="ep-del" data-idx="${i}" title="删除">×</span>
    </div>
  `).join('');
  epDiv.querySelectorAll('.ep-del').forEach(el=>el.addEventListener('click',function(){
    const idx=parseInt(this.dataset.idx);
    const node=findNode(currentMindMap,currentNodeId);
    if(!node)return;
    if(!node.examPoints)node.examPoints=[];
    node.examPoints.splice(idx,1);
    saveMindMap(currentSectionId,currentMindMap);
    renderExamPoints(node);
    toast('考点已删除');
  }));
}

function renderRelatedQuestions(node){
  const div=$('#relQuestions');
  const qs=getQuestionsForNode(currentSectionId,node.id);
  $('#relQuestionCount').textContent=`(${qs.length}道)`;
  if(qs.length===0){div.innerHTML='<p style="color:var(--text2);font-size:.78rem">暂无关联题目</p>';return}
  div.innerHTML=qs.slice(0,10).map((q,i)=>`
    <div class="question-item">
      <span class="q-type ${q.type||'简答'}">${q.type||'简答'}</span>
      <div class="q-text">${esc(q.question)}</div>
      <div class="q-answer" id="relAns${i}">💡 ${esc(q.answer)}</div>
      <button class="q-toggle" data-idx="${i}">显示答案 ▾</button>
    </div>
  `).join('');
  if(qs.length>10){div.innerHTML+=`<p style="font-size:.75rem;color:var(--text2);text-align:center">...共 ${qs.length} 道，更多题目请查看题库</p>`}
  div.querySelectorAll('.q-toggle').forEach(btn=>btn.addEventListener('click',function(){
    const i=parseInt(this.dataset.idx);
    const ans=$('#relAns'+i);
    const open=ans.classList.toggle('show');
    this.textContent=open?'收起答案 ▴':'显示答案 ▾';
  }));
}

    input.removeEventListener('blur',save);input.removeEventListener('keydown',onKey);
  };
  const onKey=e=>{if(e.key==='Enter')save();if(e.key==='Escape'){input.style.display='none';title.style.display='';input.removeEventListener('blur',save);input.removeEventListener('keydown',onKey)}};
  input.addEventListener('blur',save);
  input.addEventListener('keydown',onKey);
}

function addChildNode(){
  if(!currentNodeId)return;
  const name=prompt('输入新节点名称:');
  if(!name||!name.trim())return;
  const parent=findNode(currentMindMap,currentNodeId);
  if(!parent)return;
  if(!parent.children)parent.children=[];
  const child={name:name.trim(),id:uid(),examPoints:[],children:[]};
  parent.children.push(child);
  saveMindMap(currentSectionId,currentMindMap);
  renderMindMap();
  updateStats();
  toast(`子节点「${child.name}」已添加`);
}

function deleteNode(){
  if(!currentNodeId)return;
  if(currentNodeId===currentMindMap.id){toast('无法删除根节点');return}
  const node=findNode(currentMindMap,currentNodeId);
  if(!node)return;
  const childCount=countNodes(node)-1;
  const qCount=getQuestionsForNode(currentSectionId,currentNodeId).length;
  let msg=`确定删除节点「${node.name}」？`;
  if(childCount>0)msg+=`\n将同时删除其下 ${childCount} 个子节点。`;
  if(qCount>0)msg+=`\n将同时删除关联的 ${qCount} 道题目。`;
  if(!confirm(msg))return;
  // Cascade delete questions
  const allIds=collectNodeIds(node);
  let bank=getQuestionBank(currentSectionId);
  bank=bank.filter(q=>!allIds.has(q.nodeId));
  saveQuestionBank(currentSectionId,bank);
  // Remove from tree
  const parent=findParent(currentMindMap,currentNodeId);
  if(parent)parent.children=parent.children.filter(c=>c.id!==currentNodeId);
  saveMindMap(currentSectionId,currentMindMap);
  currentNodeId=null;
  clearDetail();
  renderMindMap();
  updateStats();
  toast('节点已删除');
}

function collectNodeIds(node,set=new Set()){
  set.add(node.id);
  if(node.children)node.children.forEach(c=>collectNodeIds(c,set));
  return set;
}

function openPractice(){

    const shuffled=[...bank].sort(()=>Math.random()-.5);

  }

  if(qs.length<3){
    const mock=MOCK_QUESTIONS[currentSectionId]||MOCK_QUESTIONS.math;
    qs=[...qs,...mock.slice(0,3-qs.length)];
  }
  qs=qs.slice(0,3);

  practiceState={nodeId:currentNodeId,nodeName:node.name,questions:qs,currentIndex:0,results:[]};

// ═══════════════════════════════════════════════════════════
//  PDF Processing
// ═══════════════════════════════════════════════════════════
async function processPDF(pdf,fileName,sectionId){
  const totalPages=pdf.numPages;
  const pagesToRead=Math.min(totalPages,8);
  let text='';
  for(let i=1;i<=pagesToRead;i++){
    try{const page=await pdf.getPage(i);const c=await page.getTextContent();text+=c.items.map(it=>it.str).join(' ')+'\n'}catch(e){}
  }
  // Simulate LLM
  const delay=1500+Math.random()*2500;
  await new Promise(r=>setTimeout(r,delay));

  const base=JSON.parse(JSON.stringify(MOCK_TEMPLATES[sectionId]||{name:getSectionById(sectionId)?.name||'PDF导入',children:[]}));
  // Customize based on text
  const detectors={math:['极限','导数','积分','矩阵','概率','微分','特征值','行列式'],english:['reading','write','translate','vocabulary','grammar','essay','comprehension'],politics:['矛盾','实践','社会主义','现代化','价值','人民','发展','改革'],cs:['算法','数据结构','排序','进程','TCP','Cache','操作','网络','页面','信号'],bagu:['闭包','Promise','React','CSS','HTTP','原型','async','组件','Hook','虚拟']};
  const kw=detectors[sectionId]||[];
  const matched=kw.filter(t=>text.toLowerCase().includes(t.toLowerCase()));
  if(matched.length>0){
    const extractedNode={name:`📄 PDF: ${fileName}`,children:matched.slice(0,5).map(t=>({name:t,examPoints:[`从PDF识别的「${t}」相关考点`,'建议结合教材深入学习','历年考研重点考查内容']})),sourceFile:fileName,createdAt:new Date().toISOString()};
    base.children.push(extractedNode);
  }
  // Mark all generated nodes with metadata
  function markSource(n){
    n.sourceFile=fileName;n.createdAt=new Date().toISOString();
    if(n.children)n.children.forEach(markSource);
  }
  markSource(base);
  addIds(base);
  return base;
}

function mergeMindMaps(existing,incoming){
  if(!incoming?.children)return existing;
  const merged=JSON.parse(JSON.stringify(existing));
  ensureIds(merged);
  if(!merged.children)merged.children=[];
  const nameMap=new Map();merged.children.forEach(c=>nameMap.set(c.name,c));
  for(const inc of incoming.children){
    if(nameMap.has(inc.name)){
      const exist=nameMap.get(inc.name);
      if(inc.children&&exist.children){
        const subNames=new Set(exist.children.map(c=>c.name));
        for(const s of inc.children){if(!subNames.has(s.name))exist.children.push(s)}
      }
    }else{merged.children.push(inc)}
  }
  return merged;
}

async function doUpload(file,sectionId){
  const loading=document.createElement('div');loading.className='loading-overlay';loading.innerHTML='<div class="spinner"></div><p style="color:var(--text2)">解析PDF并生成知识点...</p>';document.body.appendChild(loading);

  }catch(err){loading.remove();console.error(err);toast('处理失败: '+(err.message||'未知错误'))}
}

  });

  // Header buttons
  $('#btnAddSection').addEventListener('click',()=>{const n=prompt('输入新板块名称:');if(n)createSection(n)});
  $('#btnUpload').addEventListener('click',triggerUpload);
  $('#fileInput').addEventListener('change',handleFileSelect);
  $('#btnQuestionBank').addEventListener('click',()=>openQuestionBank(''));
  $('#btnExport').addEventListener('click',exportData);
  $('#btnImport').addEventListener('click',triggerImport);
  $('#importInput').addEventListener('change',handleImport);

  // Detail panel buttons
  $('#btnPractice').addEventListener('click',openPractice);
  $('#btnAddQuestionForNode').addEventListener('click',quickAddQuestionForNode);
  $('#btnEditNode').addEventListener('click',editNodeName);
  $('#btnAddChild').addEventListener('click',addChildNode);
  $('#btnDeleteNode').addEventListener('click',deleteNode);
  $('#btnAddExamPoint').addEventListener('click',showAddExamPoint);
  $('#btnSaveEp').addEventListener('click',saveExamPoint);
  $('#btnCancelEp').addEventListener('click',()=>{$('#addEpForm').style.display='none';$('#newEpInput').value=''});
  $('#newEpInput').addEventListener('keydown',e=>{if(e.key==='Enter')saveExamPoint();if(e.key==='Escape'){$('#addEpForm').style.display='none';$('#newEpInput').value=''}});

  // Context menu
  $('#chartContextMenu').addEventListener('click',e=>{
    const action=e.target.closest('.menu-item')?.dataset.action;
    hideContextMenu();
    if(action==='addChild')addChildNode();
    else if(action==='edit')editNodeName();
    else if(action==='delete')deleteNode();
  });

  // Global
  document.addEventListener('keydown',e=>{
    if(e.key==='Escape'){closePractice();closeUploadModal();closeQuestionBank()}
    if(e.ctrlKey&&e.key>='1'&&e.key<='9'){const idx=parseInt(e.key)-1;if(idx<sections.length){e.preventDefault();switchSection(sections[idx].id)}}
  });
  document.addEventListener('click',e=>{if(e.target.classList.contains('modal-overlay')){if(e.target.id==='practiceOverlay')closePractice();if(e.target.id==='uploadModal')closeUploadModal();if(e.target.id==='qbankOverlay')closeQuestionBank()}});
}

document.addEventListener('DOMContentLoaded',init);

// ═══════════════════════════════════════════════════════════
//  PWA — Service Worker Registration
// ═══════════════════════════════════════════════════════════
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').then(reg => {
      console.log('[SW] Registered:', reg.scope);
    }).catch(err => {
      console.warn('[SW] Registration failed:', err);
    });
  });
}

// ═══════════════════════════════════════════════════════════
//  PWA — Install Prompt
// ═══════════════════════════════════════════════════════════
let deferredPrompt = null;
const installBanner = document.getElementById('installBanner');

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  if (installBanner && !localStorage.getItem(LS+'installDismissed')) {
    installBanner.classList.add('show');
  }
});

document.getElementById('btnInstall')?.addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  console.log('[PWA] Install outcome:', outcome);
  deferredPrompt = null;
  installBanner?.classList.remove('show');
  localStorage.setItem(LS+'installDismissed', '1');
});

document.getElementById('btnDismissInstall')?.addEventListener('click', () => {
  installBanner?.classList.remove('show');
  localStorage.setItem(LS+'installDismissed', '1');
});

// Show iOS install hint (Safari)
const isIOS = /iphone|ipad|ipod/.test(navigator.userAgent.toLowerCase());
const isStandalone = navigator.standalone || window.matchMedia('(display-mode: standalone)').matches;
if (isIOS && !isStandalone && !localStorage.getItem(LS+'installDismissed')) {
  setTimeout(() => {
    if (installBanner) {
      installBanner.querySelector('.ib-text').innerHTML =
        '<strong>添加到主屏幕</strong>点击分享按钮 <span style="font-size:1.1rem">⎋</span> → 「添加到主屏幕」';
      installBanner.querySelector('#btnInstall').textContent = '知道了';
      installBanner.querySelector('#btnInstall').addEventListener('click', function handler() {
        installBanner.classList.remove('show');
        localStorage.setItem(LS+'installDismissed', '1');
        this.removeEventListener('click', handler);
      }, { once: true });
      installBanner.classList.add('show');
    }
  }, 3000);
}
</script>
</body>
</html>
